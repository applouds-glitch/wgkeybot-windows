name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  WINTUN_VERSION: "0.14.1"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            wintun_arch: amd64
          - goarch: 386
            wintun_arch: x86

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Derive version from tag
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          # Fallback for workflow_dispatch / non-version refs.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+){0,2}'; then
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          CORE="${VERSION%%-*}"
          MAJOR="$(printf '%s' "$CORE" | cut -d. -f1)"
          MINOR="$(printf '%s' "$CORE" | cut -d. -f2)"
          PATCH="$(printf '%s' "$CORE" | cut -d. -f3)"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR:-0}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR:-0}" >> "$GITHUB_OUTPUT"
          echo "patch=${PATCH:-0}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (${MAJOR:-0}.${MINOR:-0}.${PATCH:-0})"

      - name: Regenerate .syso for target arch
        run: >
          GOARCH=${{ matrix.goarch }} "$(go env GOPATH)/bin/goversioninfo"
          -ver-major=${{ steps.ver.outputs.major }}
          -ver-minor=${{ steps.ver.outputs.minor }}
          -ver-patch=${{ steps.ver.outputs.patch }}
          -product-version="${{ steps.ver.outputs.version }}"
          -file-version="${{ steps.ver.outputs.version }}"
          -o rsrc_windows.syso versioninfo.json

      - name: Download wintun
        run: |
          curl -sSL "https://www.wintun.net/builds/wintun-${WINTUN_VERSION}.zip" -o wintun.zip
          unzip -j wintun.zip "wintun/bin/${{ matrix.wintun_arch }}/wintun.dll"

      - name: Build
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build -trimpath
          -ldflags="-s -w -H windowsgui -X github.com/wgkeybot/windows/tray.Version=${{ steps.ver.outputs.version }}"
          -o wgkeybot.exe .

      # NOTE: builds ship UNSIGNED on purpose. A self-signed Authenticode
      # signature does not chain to a trusted root and makes Defender/SmartScreen
      # MORE suspicious, not less. When a real OV/EV code-signing cert is
      # available, add a signing step here (osslsigncode with the .pfx from
      # repo secrets) — never re-introduce self-signed signing.

      - name: Package
        run: zip "wgkeybot-${{ github.ref_name }}-windows-${{ matrix.goarch }}.zip" wgkeybot.exe wintun.dll

      - name: Generate release notes
        if: matrix.goarch == 'amd64'
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -n 1)
          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD")
            CHANGELOG_LINK="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)")
            CHANGELOG_LINK=""
          fi
          cat > RELEASE_NOTES.md << EOF
          ## What's Changed

          $COMMITS

          $CHANGELOG_LINK
          EOF
          echo "file=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

      - name: Release (amd64, with notes)
        if: matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@v2
        with:
          files: wgkeybot-${{ github.ref_name }}-windows-${{ matrix.goarch }}.zip
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (attach only)
        if: matrix.goarch != 'amd64'
        uses: softprops/action-gh-release@v2
        with:
          files: wgkeybot-${{ github.ref_name }}-windows-${{ matrix.goarch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
